# Cloudflare Pages configuration for Spirit Media Portal
# Secrets are set via: wrangler pages secret put <KEY> --project-name spirit-media-portal
# Local dev uses .dev.vars (not committed)

name = "spirit-media-portal"
compatibility_date = "2024-09-23"
pages_build_output_dir = "dist"

[vars]
TOOLS_API_URL = "https://tools-api.spiritmediapublishing.com"

# Secret bindings (values set via `wrangler pages secret put`)
# TOOLS_API_SECRET — set for both production and preview environments
